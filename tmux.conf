# yakuake-save-session tmux configuration
# This is a standalone config — use with: tmux -f /path/to/this/tmux.conf
# Or symlink/include from your main ~/.tmux.conf

# --- Plugin manager ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Resurrect settings ---
# Capture and restore pane contents (scrollback history)
set -g @resurrect-capture-pane-contents 'on'

# Save and restore shell history (per-pane bash history)
set -g @resurrect-save-shell-history 'on'

# --- Continuum settings ---
# Auto-restore when tmux starts
# Restore is triggered explicitly by the restore script, not automatically.
# This avoids race conditions with the Yakuake session restore.
set -g @continuum-restore 'off'

# Auto-save interval in minutes
set -g @continuum-save-interval '10'

# --- General settings ---
# Increase scrollback buffer
set -g history-limit 50000

# Initialize TPM (must be before our status-left override)
run '~/.tmux/plugins/tpm/tpm'

# Add separator between session name and window info for readability
# Without this, "yakuake-9" + "0:bash" displays as "yakuake-90:bash"
# Set AFTER TPM so plugins don't override it.
set -g status-left '[#S] '
